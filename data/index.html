<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyle Subdivision Data | Emmanuel "Manny" Camacho</title>

  <style>
    :root {
      --emerald:#065f46;
      --emerald-soft:rgba(6,95,70,.18);
      --bg:#000;
      --text:#fff;
      --muted:rgba(255,255,255,.7);
      --border:rgba(255,255,255,.15);
      --maxw:1240px;
    }

    body {
      margin:0;
      font-family:"Hedvig Letters Serif", serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap {
      max-width:var(--maxw);
      margin:auto;
      padding:140px 20px 40px;
    }

    .panel {
      border:1px solid var(--border);
      padding:18px;
      margin-bottom:18px;
    }

    .title h1 {
      margin:0;
      font-size:28px;
    }

    .toolbar {
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:12px;
    }

    select {
      width:100%;
      padding:10px;
      background:#000;
      color:#fff;
      border:1px solid var(--border);
    }

    .stats {
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:10px;
    }

    .stat {
      border:1px solid var(--border);
      padding:10px;
    }

    .stat-label {
      font-size:11px;
      color:var(--muted);
    }

    .stat-value {
      font-size:22px;
      font-weight:700;
    }

    .chart {
      border:1px solid var(--border);
      padding:10px;
    }

    .chart-lg canvas { height:420px !important; }
    .chart-sm canvas { height:160px !important; }

    .grid-2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .stack {
      display:grid;
      gap:12px;
    }
  </style>
</head>

<body>

<div class="wrap">

<div class="panel title">
  <h1>Kyle Subdivision Data</h1>
</div>

<div class="panel toolbar">
  <select id="subdivisionSelect"></select>
  <div id="summary">Select subdivision</div>
</div>

<div class="panel stats">
  <div class="stat"><div class="stat-label">ACTIVE</div><div class="stat-value" id="active"></div></div>
  <div class="stat"><div class="stat-label">SOLD</div><div class="stat-value" id="sold"></div></div>
  <div class="stat"><div class="stat-label">MEDIAN</div><div class="stat-value" id="median"></div></div>
  <div class="stat"><div class="stat-label">PAIN</div><div class="stat-value" id="pain"></div></div>
  <div class="stat"><div class="stat-label">LIQUIDITY</div><div class="stat-value" id="liq"></div></div>
  <div class="stat"><div class="stat-label">FAILURE</div><div class="stat-value" id="fail"></div></div>
</div>

<div class="panel chart chart-lg">
  <canvas id="price"></canvas>
</div>

<div class="stack">
  <div class="panel chart chart-sm"><canvas id="avg"></canvas></div>
  <div class="panel chart chart-sm"><canvas id="abs"></canvas></div>
</div>

<div class="grid-2">
  <div class="panel chart"><canvas id="dom"></canvas></div>
  <div class="panel chart"><canvas id="conv"></canvas></div>
</div>

<div class="panel chart">
  <canvas id="sa"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const crosshair={
  id:'crosshair',
  afterDatasetsDraw(chart){
    const {ctx,tooltip,chartArea}=chart;
    if(!tooltip || !tooltip._active || !tooltip._active.length) return;
    const x=tooltip._active[0].element.x;
    ctx.beginPath();
    ctx.moveTo(x,chartArea.top);
    ctx.lineTo(x,chartArea.bottom);
    ctx.strokeStyle='rgba(255,255,255,.25)';
    ctx.stroke();
  }
};
Chart.register(crosshair);

const $=id=>document.getElementById(id);

let data=[],charts={};

function destroy(){
  Object.values(charts).forEach(c=>c?.destroy());
}

function base(){
  return{
    responsive:true,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#fff'}}},
    scales:{
      x:{ticks:{color:'#fff'},grid:{color:'rgba(255,255,255,.1)'}},
      y:{ticks:{color:'#fff'},grid:{color:'rgba(255,255,255,.1)'}}
    }
  }
}

function render(name){

  const d=data.find(x=>x.subdivision===name);
  if(!d) return;

  const m=d.months;
  const last=m[m.length-1];

  $('summary').textContent=d.summary;

  $('active').textContent=last.active;
  $('sold').textContent=last.sold;
  $('median').textContent='$'+last.median_price.toLocaleString();
  $('pain').textContent=(last.failure_rate*100).toFixed(1);
  $('liq').textContent=(last.sell_through_rate*100).toFixed(1);
  $('fail').textContent=(last.failure_rate*100).toFixed(1);

  const labels=m.map(x=>x.month);

  destroy();

  charts.price=new Chart(price,{
    type:'line',
    data:{labels,datasets:[{data:m.map(x=>x.median_price),borderColor:'#065f46',borderWidth:2.5,pointRadius:0}]},
    options:base()
  });

  charts.avg=new Chart(avg,{
    type:'line',
    data:{labels,datasets:[{data:m.map(x=>x.avg_price),borderColor:'#fff',pointRadius:0}]},
    options:base()
  });

  charts.abs=new Chart(abs,{
    type:'line',
    data:{labels,datasets:[{data:m.map(x=>x.absorption_rate*100),borderColor:'#065f46'}]},
    options:base()
  });

  charts.dom=new Chart(dom,{
    data:{
      labels,
      datasets:[
        {type:'line',data:m.map(x=>x.median_dom),borderColor:'#065f46'},
        {type:'bar',data:m.map(x=>x.withdrawn_expired),backgroundColor:'rgba(255,255,255,.2)',yAxisID:'y1'}
      ]
    },
    options:{
      ...base(),
      scales:{y:{},y1:{position:'right',grid:{drawOnChartArea:false}}}
    }
  });

  charts.conv=new Chart(conv,{
    type:'line',
    data:{
      labels,
      datasets:[
        {data:m.map(x=>x.sell_through_rate*100),borderColor:'#065f46'},
        {data:m.map(x=>x.failure_rate*100),borderColor:'#fff'}
      ]
    },
    options:base()
  });

  charts.sa=new Chart(sa,{
    data:{
      labels,
      datasets:[
        {type:'bar',data:m.map(x=>x.sold),backgroundColor:'rgba(6,95,70,.3)'},
        {type:'line',data:m.map(x=>x.active),borderColor:'#fff'}
      ]
    },
    options:base()
  });
}

async function load(){
  const res=await fetch('subdivision_dashboard.json',{cache:'no-store'});
  data=await res.json();

  const names=[...new Set(data.map(x=>x.subdivision))].sort();

  const sel=$('subdivisionSelect');

  names.forEach(n=>{
    const o=document.createElement('option');
    o.value=n;
    o.textContent=n;
    sel.appendChild(o);
  });

  if(names.length){
    sel.value=names[0];
    render(names[0]);
  }
}

$('subdivisionSelect').addEventListener('change',e=>render(e.target.value));

load();
</script>

</body>
</html>
