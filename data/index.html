<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kyle Subdivision Data</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    select {
      padding: 10px;
      margin-bottom: 20px;
      width: 300px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    canvas {
      background: #111;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>Kyle Subdivision Data</h1>

<select id="subdivisionSelect">
  <option value="">Choose a subdivision</option>
</select>

<div id="summary"></div>

<div class="grid">
  <canvas id="priceChart"></canvas>
  <canvas id="volumeChart"></canvas>
  <canvas id="failureChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const subdivisionSelect = document.getElementById("subdivisionSelect");
const summary = document.getElementById("summary");

let allData = [];
let priceChart, volumeChart, failureChart;

function destroyCharts() {
  if (priceChart) priceChart.destroy();
  if (volumeChart) volumeChart.destroy();
  if (failureChart) failureChart.destroy();
}

async function loadData() {
  try {
    const response = await fetch("subdivision_dashboard.json", { cache: "no-store" });
    if (!response.ok) throw new Error("Data not found");

    allData = await response.json();

    const names = [...new Set(allData.map(x => x.subdivision))].sort();

    subdivisionSelect.innerHTML = '<option value="">Choose a subdivision</option>';

    names.forEach(name => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      subdivisionSelect.appendChild(opt);
    });

    if (names.length) {
      subdivisionSelect.value = names[0];
      renderSubdivision(names[0]);
    }

  } catch (err) {
    console.error(err);
    summary.textContent = "Error loading data.";
  }
}

function renderSubdivision(name) {
  const row = allData.find(x => x.subdivision === name);

  if (!row || !row.months) {
    summary.textContent = "No data.";
    destroyCharts();
    return;
  }

  const months = row.months;

  const labels = months.map(m => m.month);
  const prices = months.map(m => m.median_price);
  const sold = months.map(m => m.sold);
  const failure = months.map(m => (m.failure_rate || 0) * 100);

  summary.textContent = name;

  destroyCharts();

  // PRICE
  priceChart = new Chart(document.getElementById("priceChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Median Price",
        data: prices,
        borderColor: "#00ff88",
        tension: 0.3
      }]
    }
  });

  // SOLD
  volumeChart = new Chart(document.getElementById("volumeChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Sold",
        data: sold,
        backgroundColor: "#00ff88"
      }]
    }
  });

  // FAILURE
  failureChart = new Chart(document.getElementById("failureChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Failure %",
        data: failure,
        borderColor: "#ff4444",
        tension: 0.3
      }]
    }
  });
}

/* ===== EVENT LISTENER (CORRECT PLACE) ===== */
subdivisionSelect.addEventListener("change", function (e) {
  renderSubdivision(e.target.value);
});

/* ===== RUN ===== */
loadData();

</script>

</body>
</html>
